<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 36" width="1000" height="36">
  <!-- bar bg -->
  <rect width="1000" height="36" fill="#c0c0c0"/>
  <rect x="0" y="0" width="1000" height="2" fill="#ffffff"/>
  <rect x="0" y="2" width="1000" height="1" fill="#dfdfdf"/>
  <rect x="0" y="34" width="1000" height="2" fill="#000000"/>
  <rect x="0" y="33" width="1000" height="1" fill="#808080"/>

  <!-- Start button -->
  <g transform="translate(8, 5)">
    <rect width="86" height="26" fill="#c0c0c0"/>
    <rect width="86" height="1" fill="#ffffff"/>
    <rect width="1" height="26" fill="#ffffff"/>
    <rect y="25" width="86" height="1" fill="#000000"/>
    <rect x="85" width="1" height="26" fill="#000000"/>
    <rect x="1" y="1" width="84" height="1" fill="#dfdfdf"/>
    <rect x="1" y="1" width="1" height="24" fill="#dfdfdf"/>
    <rect x="1" y="24" width="84" height="1" fill="#808080"/>
    <rect x="84" y="1" width="1" height="24" fill="#808080"/>

    <!-- mini flag -->
    <g transform="translate(8, 5) skewX(-12)">
      <rect x="0" y="0" width="6" height="6" fill="#ff3344"/>
      <rect x="7" y="0" width="6" height="6" fill="#33dd55"/>
      <rect x="0" y="7" width="6" height="6" fill="#3388ff"/>
      <rect x="7" y="7" width="6" height="6" fill="#ffcc22"/>
    </g>
    <text x="34" y="18" font-family="'Tahoma','Verdana',sans-serif" font-size="12" font-weight="700" fill="#000">Start</text>
  </g>

  <!-- separator -->
  <rect x="100" y="6" width="1" height="24" fill="#808080"/>
  <rect x="101" y="6" width="1" height="24" fill="#ffffff"/>

  <!-- open task -->
  <g transform="translate(110, 5)">
    <rect width="220" height="26" fill="#a0a0a0"/>
    <rect width="220" height="1" fill="#000000"/>
    <rect width="1" height="26" fill="#000000"/>
    <rect y="25" width="220" height="1" fill="#ffffff"/>
    <rect x="219" width="1" height="26" fill="#ffffff"/>
    <!-- mini flag matching Start -->
    <g transform="translate(8, 5) skewX(-12)">
      <rect x="0" y="0" width="6" height="6" fill="#ff3344"/>
      <rect x="7" y="0" width="6" height="6" fill="#33dd55"/>
      <rect x="0" y="7" width="6" height="6" fill="#3388ff"/>
      <rect x="7" y="7" width="6" height="6" fill="#ffcc22"/>
    </g>
    <text x="34" y="18" font-family="'Tahoma','Verdana',sans-serif" font-size="11" fill="#000">About: zagrosi-code.exe</text>
  </g>

  <!-- system tray -->
  <g transform="translate(870, 5)">
    <rect width="120" height="26" fill="#c0c0c0"/>
    <rect width="120" height="1" fill="#808080"/>
    <rect width="1" height="26" fill="#808080"/>
    <rect y="25" width="120" height="1" fill="#ffffff"/>
    <rect x="119" width="1" height="26" fill="#ffffff"/>
    <text x="60" y="18" font-family="'Tahoma','Verdana',sans-serif" font-size="11" fill="#000" text-anchor="middle">▣ ♪ ⌚ 12:00 AM</text>
  </g>
</svg>
